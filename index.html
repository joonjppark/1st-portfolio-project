<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joon Park</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/b90d233a4a.js" crossorigin="anonymous"></script>
</head>

<body>
    <section id="about-me">
      <nav>
        <div class="personal__logo">Joon Park</div>
        <ul class="nav__link--list">
           <li>
            <a href="" class="
              nav__link--anchor
              link_hover-effect
              link_hover-effect--black
            ">Languages</a>
           </li>
           <li>
            <a href="" class="
              nav__link--anchor
              link_hover-effect
              link_hover-effect--black
            ">Projects</a>
           </li> 
           <li>
            <a href="" class="
              nav__link--anchor
              nav__link--anchor-primary
            ">Contact</a>
           </li>  
        </ul>
      </nav>
        <div class="flex flex1">
          <div class="about-me__info row">
            <div class="about-me__info--container">
              <figure class="about-me__picture--mask">
                <img src="./assetsdavid/joon-park.jpg" class="about-me__picture" alt="Joon Park">
              </figure>
              <h1 class="about-me__info--title">
                Hey! I'm <span class="text--purple">Joon Park</span>👋
              </h1>   
              <p class="about-me__info--para">
                I'm a <strong class="text--purple">frontend software engineer</strong> with a passion for creating innovative solutions and building impactful applications.
              </p>
              <div class="about-me__links">
                <a href="" class="about-me__link">
                  <i class="fa-brands fa-linkedin-in"></i>
                </a>
                <a href="" class="about-me__link">
                  <i class="fa-brands fa-github"></i>
                </a>
                <a href="" class="about-me__link">
                  <i class="fa-regular fa-envelope"></i>
                </a>
                <a href="" class="about-me__link">
                  <i class="fa-regular fa-file-pdf"></i>
                </a>
              </div>
            </div>
            <figure class="about-me__img--container">
                <img src="./assetsdavid/undraw_websites.svg" class="about-me__img" alt="">
            </figure>
          </div>
        </div>
    </section>
    <section id="languages">
        <div class="container">
            <div class="row">
                <h1 class="section__title">This is my technology stack</h1>
                <div class="language__list">
                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/3/38/HTML5_Badge.svg" alt="" class="language__img">
                        </figure>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
